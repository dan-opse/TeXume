services:
  # ─── Tectonic LaTeX Compilation Server ─────────────────────────────────────
  # Custom-built image: wraps the Tectonic TeX engine with a minimal Node.js
  # HTTP server. Listens on port 9292.
  # POST /compile  { source: "..." } → PDF binary
  # GET  /health                     → { status: "ok" }
  tectonic:
    build:
      context: ./tectonic-server
      dockerfile: Dockerfile
    ports:
      - "9292:9292"
    restart: unless-stopped
    environment:
      - PORT=9292
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9292/health"]
      interval: 30s
      timeout: 10s
      retries: 3
