version: "3.8"

services:
  # ─── Tectonic LaTeX Compilation Server ─────────────────────────────────────
  # This is a lightweight HTTP wrapper around the Tectonic TeX engine.
  # It listens on port 9292 and accepts POST /compile with JSON { source: "..." }
  # returning a PDF binary.
  #
  # Using the community tectonic-server image:
  # https://github.com/nicowillis/tectonic-server (or equivalent)
  tectonic:
    image: ghcr.io/nicowillis/tectonic-server:latest
    ports:
      - "9292:9292"
    restart: unless-stopped
    environment:
      - PORT=9292
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9292/health"]
      interval: 30s
      timeout: 10s
      retries: 3
